name: Déploiement en Recette

# Déploie le code Terraform lors de chaque commit/merge sur la branche "main",
# puis déclenche explicitement un déploiement Scalingo via l'API.
#
# Historiquement on s'appuyait sur l'intégration Github<=>Scalingo automatique,
# mais cela bloquait silencieusement dès qu'un check ancillaire (Docusaurus,
# Storybook) tournait au rouge : Scalingo attend tous les checks verts pour
# auto-deploy. On reproduit donc le pattern de mise-en-production.yml en recette
# pour rendre le pipeline explicite et déterministe.
on:
  push:
    branches: [ main ]

jobs:
  recette:
    uses: ./.github/workflows/terraform-template.yml
    secrets: inherit
    with:
      apply: true
      environnement_name: scalingo-recette
      environnement_url: https://recette.1jeune1solution.gouv.fr
    concurrency: terraform-state-recette # Evite les conflits sur le state Terraform

  scalingo:
    name: Déployer le code sur Scalingo
    needs: [ recette ]
    runs-on: ubuntu-latest
    environment:
      name: scalingo-recette
      url: https://recette.1jeune1solution.gouv.fr
    steps:
      - name: Configurer la CLI Scalingo
        uses: scalingo-community/setup-scalingo@v0.1.1
        with:
          version: 1.34.0
          api_token: ${{ secrets.SCALINGO_API_TOKEN }}
          region: ${{ vars.SCALINGO_REGION }}
          app_name: ${{ secrets.TF_VAR_NOM_DE_L_APPLICATION }}
      - name: Déployer le code sur Scalingo
        run: |
          scalingo integration-link-manual-deploy main
